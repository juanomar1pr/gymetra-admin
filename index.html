<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="/fa.png?v=6" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="/fa.png?v=6">

<title>Gymetra Admin | Control Panel</title>

<style>
:root {
    --bg: #000000;
    --surface: #1c1c1e;
    --accent: #0A84FF;
    --text-primary: #ffffff;
    --text-secondary: #8e8e93;
    --border: rgba(255, 255, 255, 0.1);
    --danger: #ff453a;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    background-color: var(--bg);
    background-image: radial-gradient(circle, #222 1px, transparent 1px);
    background-size: 30px 30px;
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 24px;
    height: 64px;
    background: rgba(28, 28, 30, 0.8);
    backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--border);
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
}

.brand {
    font-weight: 800;
    letter-spacing: -0.5px;
    font-size: 18px;
}

.container {
    max-width: 1240px;
    margin: 0 auto;
    padding: 120px 20px 60px 20px;
}
/* Dashboard layout */
.dashboard-grid {
    display: grid;
    grid-template-columns: minmax(0, 2fr) minmax(320px, 1fr);
    gap: 20px;
    align-items: start;
}

.panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
}

.panel-meets {
    min-height: 640px;
    display: flex;
    flex-direction: column;
}

.list-scroll {
    flex: 1;
    min-height: 0;
    max-height: 70vh;
    overflow: auto;
    padding-right: 4px;
}

.list-scroll::-webkit-scrollbar {
    width: 10px;
}

.list-scroll::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.15);
    border-radius: 10px;
}

.panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
}

.panel-title {
    margin: 0;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
}

.panel-subtitle {
    margin: 4px 0 0 0;
    color: var(--text-secondary);
    font-size: 13px;
}

.license-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

#list .card-item {
    margin-bottom: 10px;
}

@media (max-width: 980px) {
    .dashboard-grid {
        grid-template-columns: 1fr;
    }
}
#loginView {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
}

.login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    text-align: center;
    width: 100%;
    max-width: 400px;
}

.title {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: -1px;
}

.subtitle {
    color: var(--text-secondary);
    margin-bottom: 24px;
    font-size: 14px;
}

.input {
    width: 100%;
    box-sizing: border-box;
    background: #2c2c2e;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    color: white;
    font-size: 16px;
    outline: none;
    margin-bottom: 16px;
    transition: 0.2s;
}

.input:focus {
    border-color: var(--accent);
    background: #3a3a3c;
}

.btn {
    display: inline-block;
    background: var(--accent);
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    text-decoration: none;
}

.btn:hover {
    opacity: 0.9;
    transform: translateY(-1px);
}

.btn-secondary {
    background: #3a3a3c;
    color: var(--text-primary);
}

.btn-danger {
    background: rgba(255, 69, 58, 0.15);
    color: var(--danger);
}

.btn-danger:hover {
    background: var(--danger);
    color: white;
}

.card-item {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px 24px;
    border-radius: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.slug-name {
    font-weight: 700;
    font-size: 18px;
}

.url-preview {
    font-size: 12px;
    color: var(--accent);
    font-family: monospace;
}

.actions {
    display: flex;
    gap: 10px;
}

.hidden {
    display: none !important;
}

.error-msg {
    color: var(--danger);
    font-size: 13px;
    margin-top: 12px;
    font-weight: 600;
}

.badge {
    background: rgba(50, 215, 75, 0.1);
    color: #32D74B;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 800;
}

.notice {
    color: var(--text-secondary);
    font-size: 13px;
    margin-top: 10px;
}

.license-list {
    margin-top: 16px;
    max-height: 280px;
    overflow: auto;
    padding-right: 4px;
}

.license-list::-webkit-scrollbar {
    width: 8px;
}

.license-list::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.15);
    border-radius: 8px;
}

.license-row {
    background: #202024;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    margin-bottom: 8px;
}

.license-key {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    font-size: 12px;
    color: #9cc3ff;
    word-break: break-all;
}

.license-meta {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
}

.status-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    margin-left: 6px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
}

.status-active {
    background: rgba(50, 215, 75, 0.15);
    color: #32D74B;
}

.status-revoked {
    background: rgba(255, 69, 58, 0.15);
    color: #ff6b62;
}

.status-expired {
    background: rgba(255, 159, 10, 0.15);
    color: #ffb340;
}

.field-label {
    display: block;
    font-size: 12px;
    color: var(--text-secondary);
    margin: 2px 0 6px 2px;
    font-weight: 600;
}

@media (max-width: 600px) {
    .card-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
    }

    .actions {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
    }

    .license-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <div class="brand">GYMETRA <span style="color:var(--accent)">ADMIN</span></div>
    <div id="authBadge" class="badge hidden">SECURE SESSION</div>
</div>

<div id="loginView" class="container">
    <div class="login-card">
        <h2 class="title">Welcome Back</h2>
         <p class="subtitle">Enter User for administrator</p>
        <input
    id="email"
    class="input"
    type="email"
    placeholder="Admin Email"
    onkeypress="if(event.key==='Enter') login()"
>
        <p class="subtitle">Enter administrator credentials.</p>
        <input
            id="password"
            class="input"
            type="password"
            placeholder="Admin Password"
            onkeypress="if(event.key==='Enter') login()"
        >
        <button class="btn" style="width: 100%;" onclick="login()">Sign In</button>
        
        <div id="loginError" class="error-msg"></div>
   
    </div>
</div>

<div id="appView" class="container hidden">
    <div class="panel-header" style="margin-bottom: 20px;">
        <div class="brand" style="font-size: 20px;">Control Panel</div>
        <button class="btn btn-secondary" onclick="logout()">Logout</button>
    </div>

    <div class="dashboard-grid">
        <section class="panel panel-meets">
            <div class="panel-header">
                <div>
                    <h2 class="panel-title">Active Meets</h2>
                    <p class="panel-subtitle">Manage your live events.</p>
                </div>
            </div>
            <div id="list" class="list list-scroll"></div>
        </section>

        <aside class="panel">
            <div class="panel-header" style="margin-bottom:10px;">
                <div>
                    <h3 style="margin:0;">Create License</h3>
                    <p class="panel-subtitle">Generate a new customer license.</p>
                </div>
            </div>

            <div class="license-grid">
                <div>
                    <label class="field-label" for="licEmail">Customer email</label>
                    <input id="licEmail" class="input" type="email" placeholder="customer@email.com">
                </div>
                <div>
                    <label class="field-label" for="licMaxDevices">Max devices (default: 1)</label>
                    <input id="licMaxDevices" class="input" type="number" min="1" value="1" placeholder="1">
                </div>
            </div>

            <div class="license-grid">
                <div>
                    <label class="field-label" for="licMonths">Duration in months (default: 12)</label>
                    <input id="licMonths" class="input" type="number" min="1" value="12" placeholder="12">
                </div>
                <div>
                    <label class="field-label" for="licKeyPrefix">Key prefix</label>
                    <input id="licKeyPrefix" class="input" type="text" value="GYM" placeholder="GYM">
                </div>
            </div>

            <div class="actions">
                <button class="btn" onclick="createLicense()">Create License</button>
                <button class="btn btn-secondary" onclick="loadLicenses()">Refresh</button>
            </div>

            <div id="licenseCreateResult" class="notice"></div>
            <div class="panel-header" style="margin:16px 0 8px 0;">
                <h4 style="margin:0;">Licenses</h4>
            </div>
            <div id="licenseListResult" class="notice">Loading licenses...</div>
            <div id="licenseList" class="license-list"></div>
        </aside>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const PUBLIC_KEY = "sb_publishable_rF-UPEX2zhC5cZztSFeGaQ_-7bjyloC";

const SB_BASE_URL = "https://ulexxpaatpjtpgkancew.supabase.co/rest/v1";

function showLogin() {
    document.getElementById("loginView").classList.remove("hidden");
    document.getElementById("appView").classList.add("hidden");
    document.getElementById("authBadge").classList.add("hidden");
    document.getElementById("loginError").textContent = "";
}

function showApp() {
    document.getElementById("loginView").classList.add("hidden");
    document.getElementById("appView").classList.remove("hidden");
    document.getElementById("authBadge").classList.remove("hidden");
}

const sb = window.supabase.createClient(
    "https://ulexxpaatpjtpgkancew.supabase.co",
    PUBLIC_KEY
);
async function createLicense() {
  const resultEl = document.getElementById("licenseCreateResult");
  resultEl.textContent = "";

  const email = document.getElementById("licEmail").value.trim();
  const maxDevices = Number(document.getElementById("licMaxDevices").value || "1");
  const months = Number(document.getElementById("licMonths").value || "12");
  const keyPrefix = (document.getElementById("licKeyPrefix").value || "GYM").trim().toUpperCase();

  if (!email) {
    resultEl.textContent = "Customer email is required.";
    resultEl.style.color = "var(--danger)";
    return;
  }

  if (maxDevices < 1 || months < 1) {
    resultEl.textContent = "Max devices and months must be >= 1.";
    resultEl.style.color = "var(--danger)";
    return;
  }

  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    resultEl.textContent = "Session expired. Please login again.";
    resultEl.style.color = "var(--danger)";
    logout();
    return;
  }

  try {
    const response = await fetch(
      "https://ulexxpaatpjtpgkancew.supabase.co/functions/v1/create-license",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${session.access_token}`
        },
        body: JSON.stringify({
          customer_email: email,
          max_devices: maxDevices,
          months,
          key_prefix: keyPrefix
        })
      }
    );

    const result = await response.json();

    if (!response.ok) {
      throw new Error(result?.error || "Failed to create license.");
    }

    resultEl.style.color = "#32D74B";
    resultEl.textContent = `License created: ${result.license_key} (expires ${result.expires_at})`;
    loadLicenses();
  } catch (err) {
    resultEl.style.color = "var(--danger)";
    resultEl.textContent = err.message || "Create license failed.";
  }
}
async function loadLicenses() {
  const resultEl = document.getElementById("licenseListResult");
  const listEl = document.getElementById("licenseList");
  resultEl.textContent = "";
  listEl.innerHTML = "";

  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    resultEl.style.color = "var(--danger)";
    resultEl.textContent = "Session expired. Please login again.";
    return;
  }

  try {
    const response = await fetch(
      "https://ulexxpaatpjtpgkancew.supabase.co/functions/v1/list-licenses",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${session.access_token}`
        },
        body: JSON.stringify({ limit: 50 })
      }
    );

    const result = await response.json();
    if (!response.ok) {
      throw new Error(result?.error || "Failed to load licenses.");
    }

    const rows = Array.isArray(result?.licenses) ? result.licenses : [];
    if (!rows.length) {
      resultEl.style.color = "var(--text-secondary)";
      resultEl.textContent = "No licenses found.";
      return;
    }

    rows.forEach((item) => {
      const row = document.createElement("div");
      row.className = "license-row";
      row.innerHTML = `
        <div class="license-key">${escapeHtml(item.license_key || "")}</div>
        <div class="license-meta">
          ${escapeHtml(item.customer_email || "no-email")} · max devices: ${Number(item.max_devices || 0)} ·
          expires: ${escapeHtml(formatDateHuman(item.expires_at))}
          <span class="status-pill status-${escapeHtml((item.status || "").toLowerCase())}">${escapeHtml(item.status || "-")}</span>
        </div>
        <div class="actions" style="margin-top:8px;">
          ${(item.status || "").toLowerCase() === "revoked"
            ? `<button class="btn btn-secondary" onclick="deleteLicense('${escapeJs(item.license_key || "")}')">Delete</button>`
            : `<button class="btn btn-danger" onclick="revokeLicense('${escapeJs(item.license_key || "")}')">Revoke</button>`}
        </div>
      `;
      listEl.appendChild(row);
    });
  } catch (err) {
    resultEl.style.color = "var(--danger)";
    resultEl.textContent = err.message || "Failed to load licenses.";
  }
}

async function revokeLicense(licenseKey) {
  const resultEl = document.getElementById("licenseListResult");
  resultEl.textContent = "";

  if (!licenseKey) return;
  if (!confirm(`Revoke license ${licenseKey}?`)) return;

  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    resultEl.style.color = "var(--danger)";
    resultEl.textContent = "Session expired. Please login again.";
    return;
  }

  try {
    const response = await fetch(
      "https://ulexxpaatpjtpgkancew.supabase.co/functions/v1/revoke-license",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${session.access_token}`
        },
        body: JSON.stringify({ license_key: licenseKey })
      }
    );
    const result = await response.json();
    if (!response.ok) {
      throw new Error(result?.error || "Failed to revoke license.");
    }

    resultEl.style.color = "#32D74B";
    resultEl.textContent = `License revoked: ${licenseKey}`;
    loadLicenses();
  } catch (err) {
    resultEl.style.color = "var(--danger)";
    resultEl.textContent = err.message || "Revoke failed.";
  }
}
async function deleteLicense(licenseKey) {
  const resultEl = document.getElementById("licenseListResult");
  resultEl.textContent = "";

  if (!licenseKey) return;
  if (!confirm(`Delete license ${licenseKey}? This cannot be undone.`)) return;

  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    resultEl.style.color = "var(--danger)";
    resultEl.textContent = "Session expired. Please login again.";
    return;
  }

  try {
    const response = await fetch(
      "https://ulexxpaatpjtpgkancew.supabase.co/functions/v1/delete-license",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${session.access_token}`
        },
        body: JSON.stringify({ license_key: licenseKey })
      }
    );
    const result = await response.json();
    if (!response.ok) {
      throw new Error(result?.error || "Failed to delete license.");
    }

    resultEl.style.color = "#32D74B";
    resultEl.textContent = `License deleted: ${licenseKey}`;
    loadLicenses();
  } catch (err) {
    resultEl.style.color = "var(--danger)";
    const msg = err?.message || "";
    if (msg.toLowerCase().includes("failed to fetch")) {
      resultEl.textContent = "Delete failed: missing or unreachable delete-license function (or CORS).";
    } else {
      resultEl.textContent = msg || "Delete failed.";
    }
  }
}

function formatDateHuman(value) {
  if (!value) return "-";
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return value;
  return d.toLocaleString(undefined, {
    year: "numeric",
    month: "short",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit"
  });
}
async function login() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorEl = document.getElementById("loginError");
    errorEl.textContent = "";
    console.log("Trying login with email:", email);

    if (!email || !password) {
        errorEl.textContent = "Enter your admin email and password.";
        return;
    }

    try {
        const { data, error } = await sb.auth.signInWithPassword({
            email,
            password
        });

        if (error) {
            console.error("Supabase login error:", error);
            errorEl.textContent = error.message || "Login failed.";
            return;
        }

        if (!data.session) {
            errorEl.textContent = "Login succeeded but no session was returned.";
            return;
        }
    } catch (err) {
        console.error("Unexpected login error:", err);
        errorEl.textContent = err?.message || "Unexpected login error.";
        return;
    }

    sessionStorage.setItem("gymetra_admin", "true");

    showApp();
    load();
}

async function checkConnection() {
    const errorEl = document.getElementById("loginError");
    errorEl.textContent = "";

    try {
        const { data, error } = await sb.auth.getSession();
        console.log("Current session check:", { data, error });
        errorEl.textContent = error ? (error.message || "Auth connection failed.") : "Auth connection OK. Check browser console for details.";
    } catch (err) {
        console.error("Auth connection check failed:", err);
        errorEl.textContent = err?.message || "Auth connection failed.";
    }
}

async function load() {
    const {
        data: { session }
    } = await sb.auth.getSession();

    if (!session) {
        document.getElementById("list").innerHTML =
            '<div style="color:var(--danger); padding: 20px;">Session expired. Please login again.</div>';
        return;
    }

    sb.from("meets")
    .select("slug")
    .order("slug", { ascending: true })
    .then(({ data, error }) => {
        if (error) {
            throw new Error(error.message || "Load failed.");
        }
        const container = document.getElementById("list");
        container.innerHTML = "";

        if (!Array.isArray(data) || data.length === 0) {
            container.innerHTML = '<div style="color:var(--text-secondary); padding: 20px;">No active meets found.</div>';
            return;
        }

        data.forEach((item) => {
            const slug = item.slug || "untitled";
            const div = document.createElement("div");
            div.className = "card-item";
            div.innerHTML = `
                <div class="card-left">
                    <div class="slug-name">${escapeHtml(slug)}</div>
                    <div class="url-preview">/view.html?slug=${encodeURIComponent(slug)}</div>
                </div>
                <div class="actions">
                    <button class="btn btn-secondary" onclick="openMeet('${escapeJs(slug)}')">Open</button>
                    <button class="btn btn-danger" onclick="deleteMeet('${escapeJs(slug)}')">Delete</button>
                </div>
            `;
            container.appendChild(div);
        });
    })
    .catch((err) => {
        console.error("Loading error:", err);
        document.getElementById("list").innerHTML =
            `<div style="color:var(--danger); padding: 20px;">Failed to load meets: ${escapeHtml(err?.message || "unknown error")}</div>`;
    });
}


function openMeet(slug) {
    window.open(`https://gymetra.net/meets/view.html?slug=${encodeURIComponent(slug)}`, "_blank");
}
async function deleteMeet(slug) {
    const {
        data: { session }
    } = await sb.auth.getSession();

    if (!session) {
        alert("Session expired.");
        logout();
        return;
    }

    const response = await fetch(
        "https://ulexxpaatpjtpgkancew.supabase.co/functions/v1/delete-meet",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${session.access_token}`
            },
            body: JSON.stringify({ slug })
        }
    );

    const result = await response.json();

    if (!response.ok) {
        alert(result.error);
        return;
    }

    alert(`"${slug}" deleted successfully`);
    load();
}

async function logout() {
    await sb.auth.signOut();
    sessionStorage.removeItem("gymetra_admin");
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";
    showLogin();
}

function escapeHtml(value) {
    return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function escapeJs(value) {
    return String(value)
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'");
}

sb.auth.getSession().then(({ data }) => {
    if (data.session) {
        sessionStorage.setItem("gymetra_admin", "true");
        showApp();
        load();
        loadLicenses();
    } else {
        showLogin();
    }
});
</script>

</body>
</html>
